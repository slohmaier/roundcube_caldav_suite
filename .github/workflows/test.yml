name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - run: composer install --no-progress
      - run: composer test

  integration-tests:
    runs-on: ubuntu-latest
    services:
      radicale:
        image: tomsquest/docker-radicale:latest
        ports:
          - 5232:5232
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - run: composer install --no-progress
      - run: composer test:integration
        env:
          CALDAV_TEST_URL: http://localhost:5232
          CALDAV_TEST_USER: testuser
          CALDAV_TEST_PASS: testpass

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - run: composer install --no-progress
      - run: composer analyse

  code-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - run: composer install --no-progress
      - run: composer cs-fix -- --dry-run --diff
