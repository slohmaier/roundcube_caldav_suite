<roundcube:include file="includes/layout.html" />
<roundcube:include file="includes/menu.html" />

<h1 class="voice"><roundcube:label name="caldav_suite.tasks" /></h1>

<div id="layout-sidebar" class="listbox" role="navigation" aria-label="<roundcube:label name='caldav_suite.task_lists' />">
  <div class="header">
    <span class="header-title"><roundcube:label name="caldav_suite.task_lists" /></span>
  </div>
  <div class="scroller">
    <roundcube:object name="plugin.tasklistlist" />
  </div>
</div>

<div id="layout-content" class="selected" role="main">
  <div class="header" role="toolbar" aria-label="Task toolbar">
    <span class="header-title"><roundcube:label name="caldav_suite.tasks" /></span>
    <span class="toolbar">
      <select id="task-filter" aria-label="<roundcube:label name='caldav_suite.filter' />">
        <option value="open"><roundcube:label name="caldav_suite.filter_open" /></option>
        <option value="completed"><roundcube:label name="caldav_suite.filter_completed" /></option>
        <option value="all"><roundcube:label name="caldav_suite.filter_all" /></option>
      </select>
      <select id="task-sort" aria-label="<roundcube:label name='caldav_suite.sort_by' />">
        <option value="due"><roundcube:label name="caldav_suite.sort_due_date" /></option>
        <option value="priority"><roundcube:label name="caldav_suite.sort_priority" /></option>
        <option value="created"><roundcube:label name="caldav_suite.sort_created" /></option>
      </select>
      <button type="button" class="btn btn-primary btn-sm" id="btn-new-task"><roundcube:label name="caldav_suite.new_task" /></button>
    </span>
  </div>
  <div class="scroller">
    <roundcube:object name="plugin.tasklist" />
  </div>
</div>

<div id="aria-live-region" aria-live="polite" aria-atomic="true" class="voice"></div>

<roundcube:include file="includes/footer.html" />
